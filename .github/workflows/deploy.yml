name: Deploy MkDocs Site

on:
  push:
    branches:
      - main  # Скрипт срабатывает, когда вы пушите в main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs
          pip install mkdocs-material  # Ставим тему Material на всякий случай

      - name: Build MkDocs Site
        run: |
          mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'  # Робот сам берет готовую папку с HTML

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
